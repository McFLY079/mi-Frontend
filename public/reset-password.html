<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — Logística</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;color:#e6edf3;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:36px;width:100%;max-width:400px}
  h2{color:#1f6feb;margin-bottom:8px;font-size:20px}
  p{color:#8b949e;font-size:13px;margin-bottom:20px}
  label{display:block;font-size:12px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  input{width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px 12px;color:#e6edf3;font-size:14px;margin-bottom:14px}
  input:focus{outline:none;border-color:#1f6feb}
  button{width:100%;background:#1f6feb;color:#fff;border:none;border-radius:6px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
  button:hover{background:#388bfd}
  .msg{padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:16px;display:none}
  .msg.ok{background:#1a3a1a;border:1px solid #238636;color:#3fb950}
  .msg.err{background:#3a1a1a;border:1px solid #da3633;color:#f85149}
  .back{text-align:center;margin-top:16px}
  .back a{color:#1f6feb;font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h2>🔑 Restablecer contraseña</h2>

  <!-- PASO 1: ingresar nueva contraseña -->
  <div id="paso-reset">
    <p>Ingresa tu nueva contraseña.</p>
    <div id="msg-reset" class="msg"></div>
    <label>Nueva contraseña</label>
    <input type="password" id="nueva-pass" placeholder="Mínimo 6 caracteres">
    <label>Confirmar contraseña</label>
    <input type="password" id="confirmar-pass" placeholder="Repite la contraseña">
    <button onclick="resetearPass()">✅ Guardar nueva contraseña</button>
  </div>

  <!-- PASO 2: éxito -->
  <div id="paso-exito" style="display:none;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">✅</div>
    <h3 style="color:#3fb950;margin-bottom:8px">Contraseña actualizada</h3>
    <p style="margin-bottom:20px">Ya puedes iniciar sesión con tu nueva contraseña.</p>
    <button onclick="window.location='/'">Ir al sistema</button>
  </div>

  <!-- Token inválido -->
  <div id="paso-error" style="display:none;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">❌</div>
    <h3 style="color:#f85149;margin-bottom:8px">Link inválido o expirado</h3>
    <p style="margin-bottom:20px">El link de recuperación expiró (válido 1 hora) o ya fue usado.</p>
    <button onclick="window.location='/'">Volver al sistema</button>
  </div>

  <div class="back"><a href="/">← Volver al sistema</a></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

// Validar token al cargar
async function validarToken() {
  if (!token) { mostrarError(); return; }
  try {
    const r = await fetch(`/api/usuarios/validar-token/${token}`);
    const d = await r.json();
    if (!d.ok) mostrarError();
  } catch { mostrarError(); }
}

function mostrarError() {
  document.getElementById('paso-reset').style.display = 'none';
  document.getElementById('paso-error').style.display = '';
}

async function resetearPass() {
  const nueva     = document.getElementById('nueva-pass').value;
  const confirmar = document.getElementById('confirmar-pass').value;
  const msg       = document.getElementById('msg-reset');

  msg.style.display = 'none';
  if (nueva.length < 6) { mostrarMsg('Mínimo 6 caracteres', 'err'); return; }
  if (nueva !== confirmar) { mostrarMsg('Las contraseñas no coinciden', 'err'); return; }

  try {
    const r = await fetch('/api/usuarios/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, nuevaPass: nueva })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('paso-reset').style.display = 'none';
      document.getElementById('paso-exito').style.display = '';
    } else {
      mostrarMsg(d.error || 'Error al actualizar', 'err');
    }
  } catch { mostrarMsg('Error de conexión', 'err'); }
}

function mostrarMsg(texto, tipo) {
  const msg = document.getElementById('msg-reset');
  msg.textContent = texto;
  msg.className = `msg ${tipo}`;
  msg.style.display = 'block';
}

validarToken();
</script>
</body>
</html>
